name: CD

on:
  workflow_run:
    workflows: [ "CI" ]
    types:
      - completed
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout update branch
        uses: actions/checkout@v3
        with:
          ref: update

      - name: LoginDockerHub
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin

      - name: DockerBuild
        run: docker build -t carpriceregression .

      - name: DockerTag
        run: docker tag carpriceregression ${{secrets.DOCKER_USERNAME}}/carpriceregression:latest

      - name: Push Image
        run: docker push ${{secrets.DOCKER_USERNAME}}/carpriceregression:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_KEY}}

          script: |
            sudo fuser -k 8003/tcp || true
            sudo fuser -k 8004/tcp || true
            sudo docker stop $(sudo docker ps -q --filter "publish=8003") 2>/dev/null || true
            sudo docker stop $(sudo docker ps -q --filter "publish=8004") 2>/dev/null || true
            
            sudo docker system prune -f 
            
            sudo docker rm -f ${{secrets.DOCKER_USERNAME}}/capriceregression:latest
            sudo docker rmi ${{secrets.DOCKER_USERNAME}}/carpriceregression:latest
            
            sudo docker pull ${{secrets.DOCKER_USERNAME}}/carpriceregression:latest
            sudo docker run -d -p 8004:8502 -p 8003:8003 ${{secrets.DOCKER_USERNAME}}/carpriceregression:latest
